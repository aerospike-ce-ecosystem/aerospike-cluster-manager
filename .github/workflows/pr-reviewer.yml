name: PR Reviewer
# On 'needs-review' label: auto-reviews PR diff → auto-fixes HIGH/MEDIUM issues (max 3 rounds) → adds review-complete label

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && github.event.label.name == 'needs-review') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
    steps:
      - name: Get PR head ref
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PR_REF=$(gh pr view ${{ env.PR_NUMBER }} --json headRefName --jq '.headRefName')
          echo "ref=$PR_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr-info.outputs.ref }}
          fetch-depth: 0

      - name: Run Claude Code - PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          allowed_bots: '${{ vars.CLAUDE_ALLOWED_BOTS }}'
          branch_prefix: ''
          prompt: |
            You are an AI code review agent for **aerospike-cluster-manager**.

            ## Project Context
            - API: FastAPI (Python 3.13) in `api/`
            - UI:  Next.js 16 (React 19) in `ui/`

            ## Task
            Review PR #${{ env.PR_NUMBER }} with auto-fix loop (max ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }} iterations).

            ### Review Loop
            For each iteration (up to ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}):

            1. **Analyze**: `gh pr diff ${{ env.PR_NUMBER }}`
               - **HIGH**: Bugs, security (XSS, injection), broken API contracts, auth bypasses, data corruption, build-breaking
               - **MEDIUM**: Missing error handling, incomplete tests, missing TypeScript types, accessibility
               - **LOW**: Naming, docs, style

            2. **If HIGH or MEDIUM issues + iteration < ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}**: Fix all HIGH and MEDIUM issues, commit (`fix(review): ...`), push, comment progress, continue
            3. **If no HIGH/MEDIUM issues or limit reached**: Break

            ### Final Review
            Post summary comment with severity counts, auto-fixed items, and suggestions.
            End with: `@kimsoungryoul — Review complete. Human review requested.`

            Add `review-complete` label: `gh pr edit ${{ env.PR_NUMBER }} --add-label "review-complete"`

            ## Constraints
            - Max ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }} iterations, auto-fix HIGH and MEDIUM issues
            - Leave LOW as suggestions only
            - Always mention @kimsoungryoul in final comment
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'
