name: PR Reviewer

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run Claude Code - PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          branch_prefix: ''
          prompt: |
            You are an AI code review agent for **aerospike-cluster-manager**.

            ## Project Context
            - Backend: FastAPI (Python 3.13) in `backend/`
            - Frontend: Next.js 16 (React 19) in `frontend/`

            ## Task
            Review PR #${{ github.event.pull_request.number }} with auto-fix loop (max 3 iterations).

            ### Review Loop
            For each iteration (up to 3):

            1. **Analyze**: `gh pr diff ${{ github.event.pull_request.number }}`
               - **HIGH**: Bugs, security (XSS, injection), broken API contracts, auth bypasses, data corruption, build-breaking
               - **MEDIUM**: Missing error handling, incomplete tests, missing TypeScript types, accessibility
               - **LOW**: Naming, docs, style

            2. **If HIGH issues + iteration < 3**: Fix, commit (`fix(review): ...`), push, comment progress, continue
            3. **If no HIGH or limit reached**: Break

            ### Final Review
            Post summary comment with severity counts, auto-fixed items, and suggestions.
            End with: `@kimsoungryoul — Review complete. Human review requested.`

            Add `review-complete` label: `gh pr edit ${{ github.event.pull_request.number }} --add-label "review-complete"`

            ## Constraints
            - Max 3 iterations, only auto-fix HIGH issues
            - Always mention @kimsoungryoul in final comment
          claude_args: |
            --max-turns 25
          settings: '{"git":{"includeCoAuthor":false}}'
