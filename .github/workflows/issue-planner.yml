name: Issue Planner

on:
  issues:
    types: [labeled]

jobs:
  plan:
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - Issue Planner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '24240623'
          bot_name: 'KimSoungRyoul'
          prompt: |
            You are an AI planning agent for the **aerospike-cluster-manager** project.

            ## Project Context
            - **Backend**: FastAPI (Python 3.13) in `backend/`, uv package manager, ruff linter
            - **Frontend**: Next.js 16 (React 19) in `frontend/`, Radix/shadcn/ui, Tailwind 4, DaisyUI 5, Zustand state management
            - **Build**: Conventional Commits format

            ## Task
            Analyze issue #${{ github.event.issue.number }} and create an implementation plan.

            **Issue Title**: ${{ github.event.issue.title }}

            ### Instructions
            1. Read the issue description carefully
            2. Explore the codebase to understand relevant files and patterns
            3. If the issue is too vague, comment asking for clarification, add `needs-clarification` label, and stop.
            4. Create a structured plan and post it as a comment using `gh issue comment ${{ github.event.issue.number }}`:

            The comment must contain `<!-- agent-plan-start -->` and `<!-- agent-plan-end -->` markers with:
            - Analysis section referencing specific files
            - Proposed Changes table (File | Action | Description)
            - Implementation Strategy (numbered steps)
            - Risk Assessment (breaking changes, test coverage, dependencies)
            - Verification checklist:
              - Backend: `uv run ruff check src/`, `uv run pytest tests/ -v`
              - Frontend: `npm run type-check`, `npm run lint`, `npm run build`

            5. After posting, add `plan-complete` label: `gh issue edit ${{ github.event.issue.number }} --add-label "plan-complete"`

            ## Constraints
            - Do NOT create branches, pull requests, or modify files
            - Your ONLY outputs are: one plan comment + one label
          claude_args: |
            --max-turns 300
            --model claude-opus-4-6
            --dangerously-skip-permissions
          settings: '{"git":{"includeCoAuthor":false},"env":{"CLAUDE_CODE_EFFORT":"high"}}'
