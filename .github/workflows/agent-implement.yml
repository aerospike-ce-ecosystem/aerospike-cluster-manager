name: Agent Implement
# plan-complete 라벨 시 계획 코멘트 기반으로 코드 구현 → PR 생성 → needs-review 라벨

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'plan-complete'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ vars.CLAUDE_IMPLEMENT_TIMEOUT }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - Implement
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          allowed_bots: '${{ vars.CLAUDE_ALLOWED_BOTS }}'
          branch_prefix: '${{ vars.CLAUDE_BRANCH_PREFIX }}'
          prompt: |
            You are an AI implementation agent for the **aerospike-cluster-manager** project.

            ## Project Context
            - **Backend**: FastAPI (Python 3.13) in `backend/`, uv, ruff, pytest
            - **Frontend**: Next.js 16 (React 19) in `frontend/`, Radix/shadcn/ui, Tailwind 4, DaisyUI 5, Zustand
            - **Build**: Conventional Commits format

            ## Task
            Implement changes for issue #${{ github.event.issue.number }} based on the existing plan.

            ### Steps
            1. Read plan from issue comments (find `<!-- agent-plan-start -->`)
            2. Add `in-progress` label
            3. Implement following the plan
            4. Verify:
               - Backend: `cd backend && uv run ruff check src/`, `uv run pytest tests/ -v --tb=short`
               - Frontend: `cd frontend && npm ci && npm run type-check && npm run lint && npm run build`
            5. Commit with Conventional Commits format
            6. Create PR: `gh pr create --title "..." --body "Closes #${{ github.event.issue.number }}"`
            7. Add `needs-review` label to the **PR** (not the issue): `gh pr edit <pr-number> --add-label "needs-review"`

            ## Constraints
            - Follow Conventional Commits for all commits and PR title
            - Ensure type consistency between backend API and frontend types
            - If verification fails, comment the error and stop
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'
