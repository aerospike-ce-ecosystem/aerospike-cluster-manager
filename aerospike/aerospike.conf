service {
    cluster-name docker
    proto-fd-max 15000
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
        # Expose host-reachable address so host-side clients (backend running
        # outside the podman network) can complete cluster tend. Only valid
        # when a single node is running on port 14790 of the host.
        access-address 127.0.0.1
        access-port 14790
    }
    heartbeat {
        mode mesh
        address any
        port 3002
        mesh-seed-address-port aerospike-node-1 3002
        mesh-seed-address-port aerospike-node-2 3002
        mesh-seed-address-port aerospike-node-3 3002
        interval 150
        timeout 10
    }
    fabric {
        address any
        port 3001
    }
}

namespace test {
    replication-factor 2
    nsup-period 120
    storage-engine memory {
        data-size 1G
    }
}
