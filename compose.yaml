services:
  # ── Aerospike 3-Node Mesh Cluster ──────────────────────────────────
  aerospike-node-1:
    container_name: aerospike-node-1
    image: aerospike:ce-8.1.0.3_1
    command: ["--config-file", "/opt/aerospike/etc/aerospike.conf"]
    volumes:
      - ./aerospike/aerospike.conf:/opt/aerospike/etc/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  aerospike-node-2:
    container_name: aerospike-node-2
    image: aerospike:ce-8.1.0.3_1
    command: ["--config-file", "/opt/aerospike/etc/aerospike.conf"]
    volumes:
      - ./aerospike/aerospike.conf:/opt/aerospike/etc/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  aerospike-node-3:
    container_name: aerospike-node-3
    image: aerospike:ce-8.1.0.3_1
    command: ["--config-file", "/opt/aerospike/etc/aerospike.conf"]
    volumes:
      - ./aerospike/aerospike.conf:/opt/aerospike/etc/aerospike.conf:ro
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Aerospike Tools (stays alive for `podman exec -it`) ─────────────
  aerospike-tools:
    container_name: aerospike-tools
    image: aerospike/aerospike-tools:latest
    entrypoint: []
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      aerospike-node-1:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ── Seed Data (runs once: 1234 records + indexes) ─────────────────
  aerospike-seed:
    container_name: aerospike-seed
    image: aerospike/aerospike-tools:latest
    entrypoint: []
    volumes:
      - ./aerospike/seed-data.sh:/seed-data.sh:ro
    command: ["/usr/bin/bash", "/seed-data.sh"]
    environment:
      - AEROSPIKE_HOST=aerospike-node-1
      - AEROSPIKE_PORT=3000
    depends_on:
      aerospike-node-1:
        condition: service_healthy
      aerospike-node-2:
        condition: service_healthy
      aerospike-node-3:
        condition: service_healthy
    restart: "no"

  # ── Prometheus Exporters (per node) ────────────────────────────────
  aerospike-exporter-1:
    container_name: aerospike-exporter-1
    image: aerospike/aerospike-prometheus-exporter:1.15.0
    environment:
      - AS_HOST=aerospike-node-1
      - AS_PORT=3000
    ports:
      - "9145:9145"
    depends_on:
      aerospike-node-1:
        condition: service_healthy
    restart: unless-stopped

  aerospike-exporter-2:
    container_name: aerospike-exporter-2
    image: aerospike/aerospike-prometheus-exporter:1.15.0
    environment:
      - AS_HOST=aerospike-node-2
      - AS_PORT=3000
    ports:
      - "9146:9145"
    depends_on:
      aerospike-node-2:
        condition: service_healthy
    restart: unless-stopped

  aerospike-exporter-3:
    container_name: aerospike-exporter-3
    image: aerospike/aerospike-prometheus-exporter:1.15.0
    environment:
      - AS_HOST=aerospike-node-3
      - AS_PORT=3000
    ports:
      - "9147:9145"
    depends_on:
      aerospike-node-3:
        condition: service_healthy
    restart: unless-stopped

  # ── API + UI (single container) ────────────────────────────────────
  aerospike-cluster-manager-api:
    container_name: aerospike-cluster-manager-api
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3100}
      - HOST=0.0.0.0
      - PORT=8000
      - AEROSPIKE_HOST=${AEROSPIKE_HOST:-aerospike-node-1}
      - AEROSPIKE_PORT=${AEROSPIKE_PORT:-3000}
      - SQLITE_PATH=/app/data/connections.db
      # ── At-rest encryption (stored connection passwords) ─────────────
      - ACM_PASSWORD_KEK=${ACM_PASSWORD_KEK:-}
      - ACM_ALLOW_EPHEMERAL_KEK=${ACM_ALLOW_EPHEMERAL_KEK:-false}
      # ── OIDC (off by default) ─────────────────────────────────────
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-acko-api}
      - OIDC_REQUIRED_ROLES=${OIDC_REQUIRED_ROLES:-}
      - OIDC_JWKS_CACHE_TTL=${OIDC_JWKS_CACHE_TTL:-10m}
      - OIDC_EXCLUDE_PATHS=${OIDC_EXCLUDE_PATHS:-/api/health,/api/openapi.json,/api/docs}
      - ACM_OIDC_OWNER_CLAIM=${ACM_OIDC_OWNER_CLAIM:-sub}
      # ── Kubernetes management (off by default) ────────────────────
      - K8S_MANAGEMENT_ENABLED=${K8S_MANAGEMENT_ENABLED:-false}
      - K8S_VERIFY_SSL=${K8S_VERIFY_SSL:-true}
      - K8S_API_TIMEOUT=${K8S_API_TIMEOUT:-10}
      - K8S_LOG_TIMEOUT=${K8S_LOG_TIMEOUT:-30}
      - K8S_CA_FILE=${K8S_CA_FILE:-}
      # ── Security headers / SSE ────────────────────────────────────
      - ENABLE_HSTS=${ENABLE_HSTS:-false}
      - CSP_ENABLED=${CSP_ENABLED:-true}
      - CSP_REPORT_URI=${CSP_REPORT_URI:-}
      - SSE_ENABLED=${SSE_ENABLED:-true}
      - SSE_HEARTBEAT_INTERVAL=${SSE_HEARTBEAT_INTERVAL:-15}
      - SSE_MAX_CONNECTIONS=${SSE_MAX_CONNECTIONS:-50}
      # ── Logging ───────────────────────────────────────────────────
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      # ── OpenTelemetry (off by default) ────────────────────────────
      # Set OTEL_SDK_DISABLED=false and start with `--profile observability`
      # to run the bundled collector. See docs/observability.md.
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-aerospike-cluster-manager-api}
      - OTEL_DEPLOYMENT_ENVIRONMENT=${OTEL_DEPLOYMENT_ENVIRONMENT:-local}
      # aerospike-py Rust-core log bridge + native OTLP span exporter.
      - AEROSPIKE_PY_LOG_LEVEL=${AEROSPIKE_PY_LOG_LEVEL:-INFO}
      - AEROSPIKE_PY_TRACING=${AEROSPIKE_PY_TRACING:-true}
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      aerospike-node-1:
        condition: service_healthy
      aerospike-node-2:
        condition: service_healthy
      aerospike-node-3:
        condition: service_healthy
    restart: unless-stopped

  aerospike-cluster-manager-web:
    container_name: aerospike-cluster-manager-web
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${UI_PORT:-3100}:3100"
    environment:
      - API_URL=http://aerospike-cluster-manager-api:8000
    depends_on:
      aerospike-cluster-manager-api:
        condition: service_healthy
    restart: unless-stopped

  # ── OpenTelemetry Collector (opt-in: `--profile observability`) ─────
  # Receives OTLP traces/metrics/logs from the API and from aerospike-py's
  # Rust core, then prints them with the debug exporter so the pipeline can
  # be verified locally: `podman logs -f otel-collector`. Swap the exporter
  # in otel/otel-collector.yaml for a real backend in production.
  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/otel-collector.yaml"]
    volumes:
      - ./otel/otel-collector.yaml:/etc/otelcol-contrib/otel-collector.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    restart: unless-stopped

volumes:
  app-data:
